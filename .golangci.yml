run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  govet:
    check-shadowing: true
    enable-all: true
    disable:
      - fieldalignment
  errcheck:
    check-type-assertions: true
    check-blank: true
  staticcheck:
    go: "1.22"
    checks: ["all"]
  gosimple:
    go: "1.22"
    checks: ["all"]
  goconst:
    min-len: 3
    min-occurrences: 3
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/nicedavid98/ad-event-receiver
  revive:
    min-confidence: 0.8
    rules:
      - name: exported
      - name: var-naming
      - name: unused-parameter
      - name: unreachable-code
      - name: error-return
      - name: error-strings
      - name: if-return
  ineffassign: {}
  unused: {}

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - unused
    - ineffassign
    - goconst
    - gofmt
    - goimports
    - revive

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - goconst
    - path: cmd/
      linters:
        - revive
  max-issues-per-linter: 50
  max-same-issues: 10
